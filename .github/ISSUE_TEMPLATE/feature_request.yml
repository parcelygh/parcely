name: Feature request
description: Propose a new feature or API
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. A good feature request starts with a concrete problem, not a proposed solution — we'll work with you on the shape.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation where parcely's current API falls short. A user story or code example is ideal.
      placeholder: |
        When building a file uploader, I want to resume a failed upload from where it stopped. Today I have to wire up tus manually.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: If you have an idea for the API, sketch it. If not, just leave this blank and we'll design together.
      render: ts

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other libraries, workarounds, hand-rolled code. What did you look at before filing this?

  - type: dropdown
    id: scope
    attributes:
      label: Where does this belong?
      options:
        - Core (parcely)
        - "@parcely/auth-token"
        - "@parcely/auth-redirect"
        - A new addon package
        - Docs
        - I'm not sure
    validations:
      required: true
