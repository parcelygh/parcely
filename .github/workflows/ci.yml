name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Static verification. Runs on every push and PR. Matrix over Node 20 and 22.
  # ---------------------------------------------------------------------------
  verify:
    name: verify (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        # Version picked up from packageManager in root package.json.

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests (all workspaces)
        run: pnpm -r test

      - name: Build all packages
        run: pnpm -r build

      - name: Build docs site (onBrokenLinks=throw)
        run: pnpm docs:build

      - name: Verify every public export is documented
        run: pnpm check-docs-coverage

      - name: Type-check migration-guide snippets
        run: pnpm check-doc-snippets

      - name: Tree-shake audit (HttpError-only consumer)
        run: pnpm check-treeshake

  # ---------------------------------------------------------------------------
  # End-to-end smoke. Hits external network (httpbin) + spins up a local
  # self-signed HTTPS server. Flaky by nature so scoped to pushes on main — a
  # httpbin outage should not block PRs.
  # ---------------------------------------------------------------------------
  smoke:
    name: smoke (httpbin + self-signed TLS)
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core package (smoke reads from dist/)
        run: pnpm --filter parcely build

      - name: Run smoke test
        run: pnpm smoke
