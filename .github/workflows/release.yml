name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  # Release runs serialize — never cancel a publish in progress.
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    # Skip on forks — GitHub already prevents secrets from flowing to forked
    # PRs on pull_request events, but for the canonical push-on-main trigger
    # we also want to avoid running if someone has forked the repo and
    # pushed to their own main. `fork == false` covers both cases cleanly
    # and does not hardcode an org/repo slug.
    if: github.event.repository.fork == false
    permissions:
      contents: write
      pull-requests: write
      # id-token for npm provenance (requires NPM to have trusted-publisher set up).
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gate publish on the same verification CI runs on PRs. Catches lock
      # drift, typecheck regressions, and test failures that might sneak
      # through a direct-to-main push. Skipped when the Changesets action
      # is in version-mode (opening a release PR) — those runs just need
      # to generate the PR, not verify it.
      - name: Verify before publish
        run: |
          pnpm typecheck
          pnpm -r test
          pnpm -r build
          pnpm docs:build
          pnpm check-docs-coverage
          pnpm check-doc-snippets
          pnpm check-treeshake

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          # `publish` runs after a release-PR merge; `version` runs when
          # changesets are pending and opens a PR.
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: "chore: release"
          title: "chore: release"
          # Auto-create GitHub Releases with the generated CHANGELOG body
          # attached — gives the repo a proper release history without any
          # manual `gh release create` step.
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # setup-node writes ~/.npmrc with _authToken=${NODE_AUTH_TOKEN}.
          # Both vars must be set so the token flows to both pnpm and npm.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
