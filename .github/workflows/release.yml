name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  # Release runs serialize — never cancel a publish in progress.
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    # Only run on the canonical repo (skip on forks) and skip release-PR commits
    # themselves to avoid loops.
    if: github.repository == 'OWNER/postalservice'
    permissions:
      contents: write
      pull-requests: write
      # id-token for npm provenance (requires NPM to have trusted-publisher set up).
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (required before publish)
        run: pnpm -r build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          # `publish` runs after a release-PR merge; `version` runs when
          # changesets are pending and opens a PR.
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
